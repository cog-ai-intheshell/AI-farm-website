<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bring Your Own Agent - White Mode</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --surface: rgba(255, 255, 255, 0.68);
        --card: rgba(255, 255, 255, 0.86);
        --ink: #1d1d1f;
        --muted: #6e6e73;
        --soft: #a1a1a6;
        --rule: rgba(0, 0, 0, 0.12);
        --stone: rgba(0, 0, 0, 0.045);
        --accent: #0071e3;
        --accent-soft: rgba(0, 113, 227, 0.16);
        --gold: #34c759;
        --shadow:
          0 38px 80px rgba(0, 0, 0, 0.12),
          0 1px 0 rgba(255, 255, 255, 0.75) inset;
        --ease: cubic-bezier(0.22, 1, 0.36, 1);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        min-height: 0;
        margin: 0;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(245, 245, 247, 0.88)),
          linear-gradient(135deg, #fbfbfd 0%, #f5f5f7 48%, #ececf0 100%),
          var(--bg);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      main {
        display: grid;
        width: 100%;
        height: 100%;
        min-height: 0;
        margin: 0 auto;
        overflow: hidden;
        padding: 0;
        place-items: center;
      }

      .agent-section {
        display: grid;
        width: 100%;
        height: 100%;
        min-height: 0;
        place-items: center;
      }

      .visual {
        position: relative;
        display: flex;
        width: 100%;
        height: 100%;
        min-height: 0;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(247, 247, 249, 0.64)),
          var(--surface);
        backdrop-filter: blur(28px) saturate(180%);
        -webkit-backdrop-filter: blur(28px) saturate(180%);
      }

      .visual::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.44), transparent 42%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.28), transparent 24%, transparent 76%, rgba(255, 255, 255, 0.2));
      }

      .org-tree {
        position: relative;
        display: flex;
        width: 760px;
        min-width: 760px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 18px;
        transform: translate3d(var(--fit-x, 0), var(--fit-y, 0), 0) scale(var(--fit-scale, 1));
        transform-origin: center center;
      }

      .org-row {
        position: relative;
        display: flex;
        width: 100%;
        justify-content: center;
        gap: 14px;
      }

      .org-row--single .org-card {
        width: 210px;
      }

      .org-row--three {
        max-width: 820px;
        padding-top: 30px;
      }

      .org-row--three .org-card {
        flex: 1 1 0;
        max-width: none;
        min-width: 0;
      }

      .org-row--two {
        max-width: 570px;
        padding-top: 30px;
      }

      .org-row--two .org-card {
        flex: 1 1 0;
        max-width: none;
        min-width: 0;
      }

      .org-stem {
        position: relative;
        z-index: 1;
        width: 1px;
        height: 30px;
        margin-bottom: -1px;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.04));
        opacity: 0;
      }

      .org-row--three::before,
      .org-row--two::before {
        content: "";
        position: absolute;
        top: 0;
        z-index: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.04));
        opacity: 0;
      }

      .org-row--three::before {
        left: calc((100% - 28px) / 6);
        right: calc((100% - 28px) / 6);
      }

      .org-row--two::before {
        left: calc((100% - 14px) / 4);
        right: calc((100% - 14px) / 4);
      }

      .org-row--three .org-card::before,
      .org-row--two .org-card::before {
        content: "";
        position: absolute;
        top: -30px;
        left: 50%;
        z-index: 2;
        width: 1px;
        height: 30px;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.04));
        opacity: 0;
        transform: translateX(-50%);
      }

      .org-card {
        position: relative;
        z-index: 3;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        min-height: 72px;
        padding: 14px 17px;
        border: 1px solid rgba(255, 255, 255, 0.74);
        border-radius: 8px;
        background: var(--card);
        backdrop-filter: blur(18px) saturate(180%);
        -webkit-backdrop-filter: blur(18px) saturate(180%);
        box-shadow:
          0 14px 30px rgba(0, 0, 0, 0.08),
          0 0 0 1px rgba(0, 0, 0, 0.05);
        opacity: 0;
        transform: translateY(8px);
        transition:
          border-color 0.3s ease,
          box-shadow 0.3s ease,
          transform 0.3s ease;
      }

      .org-card.is-live {
        z-index: 10;
        border-color: var(--accent);
        box-shadow:
          0 0 0 4px var(--accent-soft),
          0 18px 36px rgba(0, 113, 227, 0.18),
          0 0 0 1px rgba(0, 113, 227, 0.32);
        transform: translateY(-1px);
      }

      .org-card.is-live::after {
        content: "Active";
        position: absolute;
        top: -12px;
        right: 12px;
        z-index: 11;
        border: 1px solid rgba(0, 113, 227, 0.18);
        border-radius: 999px;
        padding: 2px 7px;
        background: rgba(245, 251, 255, 0.92);
        color: #0066cc;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0;
        box-shadow: 0 6px 14px rgba(0, 113, 227, 0.12);
      }

      .card-icon {
        display: grid;
        width: 34px;
        height: 34px;
        flex: 0 0 34px;
        place-items: center;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(244, 244, 246, 0.86)),
          var(--stone);
        color: #515154;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.85) inset,
          0 0 0 1px rgba(0, 0, 0, 0.045);
      }

      .card-icon svg {
        width: 19px;
        height: 19px;
      }

      .card-body {
        display: flex;
        min-width: 0;
        flex-direction: column;
        gap: 2px;
      }

      .card-name {
        overflow: hidden;
        color: var(--ink);
        font-size: 16px;
        font-weight: 700;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .card-model {
        display: flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.25;
      }

      .dot {
        width: 8px;
        height: 8px;
        flex: 0 0 8px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.12);
      }

      .task-packet {
        position: absolute;
        z-index: 8;
        width: 18px;
        height: 9px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow:
          0 0 0 4px rgba(0, 113, 227, 0.12),
          0 0 16px rgba(0, 113, 227, 0.5);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .org-tree.is-visible .org-card {
        animation: node-slide 0.46s var(--ease) var(--delay, 0ms) forwards;
      }

      .org-tree.is-visible .org-stem {
        animation: fade-in 0.35s ease var(--delay, 0ms) forwards;
      }

      .org-tree.is-visible .org-row--three::before,
      .org-tree.is-visible .org-row--two::before {
        animation: fade-in 0.45s ease 220ms forwards;
      }

      .org-tree.is-visible .org-row--three .org-card::before,
      .org-tree.is-visible .org-row--two .org-card::before {
        animation: fade-in 0.35s ease var(--delay, 0ms) forwards;
      }

      @keyframes node-slide {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-in {
        to {
          opacity: 1;
        }
      }

      @media (max-width: 1000px) {
        .visual {
          width: 100%;
          min-height: 0;
          overflow: hidden;
          justify-content: center;
        }
      }

      @media (max-width: 560px) {
        .visual {
          min-height: 0;
        }

        .org-tree {
          width: 760px;
          min-width: 760px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="agent-section" aria-label="Bring your own agent">
        <div class="visual" aria-label="Animated agent organization chart">
          <div class="org-tree" id="org-tree">
            <div class="org-row org-row--single">
              <article class="org-card" data-role="ceo" style="--delay: 0ms">
                <div class="card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 20h20" />
                    <path d="M5 20V9l7-5 7 5v11" />
                    <path d="M9 20v-5h6v5" />
                  </svg>
                </div>
                <div class="card-body">
                  <span class="card-name">CEO</span>
                  <span class="card-model"><span class="dot"></span>Hermes</span>
                </div>
              </article>
            </div>

            <div class="org-stem" style="--delay: 60ms"></div>

            <div class="org-row org-row--three">
              <article class="org-card" data-role="cmo" style="--delay: 120ms">
                <div class="card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M2 12h20" />
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10" />
                  </svg>
                </div>
                <div class="card-body">
                  <span class="card-name">CMO</span>
                  <span class="card-model"><span class="dot"></span>OpenClaw</span>
                </div>
              </article>

              <article class="org-card" data-role="cto" style="--delay: 240ms">
                <div class="card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.82l.05.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.82-.33 1.7 1.7 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.68 15a1.7 1.7 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.68a1.7 1.7 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.7 1.7 0 0 0 1 1.51 1.7 1.7 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" />
                  </svg>
                </div>
                <div class="card-body">
                  <span class="card-name">CTO</span>
                  <span class="card-model"><span class="dot"></span>Codex</span>
                </div>
              </article>

              <article class="org-card" data-role="coo" style="--delay: 360ms">
                <div class="card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                    <rect x="8" y="2" width="8" height="4" rx="1" />
                  </svg>
                </div>
                <div class="card-body">
                  <span class="card-name">COO</span>
                  <span class="card-model"><span class="dot"></span>Claude</span>
                </div>
              </article>
            </div>

            <div class="org-stem" style="--delay: 420ms"></div>

            <div class="org-row org-row--two">
              <article class="org-card" data-role="eng1" style="--delay: 480ms">
                <div class="card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m16 18 6-6-6-6" />
                    <path d="m8 6-6 6 6 6" />
                  </svg>
                </div>
                <div class="card-body">
                  <span class="card-name">Frontend Eng</span>
                  <span class="card-model"><span class="dot"></span>Cursor</span>
                </div>
              </article>

              <article class="org-card" data-role="eng2" style="--delay: 600ms">
                <div class="card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m16 18 6-6-6-6" />
                    <path d="m8 6-6 6 6 6" />
                  </svg>
                </div>
                <div class="card-body">
                  <span class="card-name">Backend Eng</span>
                  <span class="card-model"><span class="dot"></span>Claude</span>
                </div>
              </article>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const tree = document.getElementById("org-tree");
      const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let fitScale = 1;

      window.addEventListener("load", () => {
        fitTree();
        queueTreeAnimation();
      });

      window.addEventListener("resize", fitTree);

      function fitTree() {
        if (!tree) return;
        const visual = tree.closest(".visual");
        if (!visual) return;

        tree.style.setProperty("--fit-scale", "1");
        const visualWidth = visual.clientWidth;
        const visualHeight = visual.clientHeight;
        const treeWidth = tree.offsetWidth;
        const treeHeight = tree.offsetHeight;
        const padding = Math.max(10, Math.min(22, Math.min(visualWidth, visualHeight) * 0.045));
        fitScale = Math.min(
          (visualWidth - padding * 2) / treeWidth,
          (visualHeight - padding * 2) / treeHeight,
          1.22
        );
        if (visualHeight < 360) fitScale = Math.min(fitScale, 0.4);
        fitScale = Math.max(0.34, fitScale);
        tree.style.setProperty("--fit-x", "0px");
        tree.style.setProperty("--fit-y", "0px");
        tree.style.setProperty("--fit-scale", fitScale.toFixed(4));
        window.requestAnimationFrame(() => settleTreePosition(visual, padding));
      }

      function settleTreePosition(visual, padding) {
        if (!tree || !visual) return;

        const visualRect = visual.getBoundingClientRect();
        const treeRect = tree.getBoundingClientRect();
        let fitX = 0;
        let fitY = 0;

        if (treeRect.left < visualRect.left + padding) {
          fitX += visualRect.left + padding - treeRect.left;
        }

        if (treeRect.right > visualRect.right - padding) {
          fitX -= treeRect.right - (visualRect.right - padding);
        }

        if (treeRect.top < visualRect.top + padding) {
          fitY += visualRect.top + padding - treeRect.top;
        }

        if (treeRect.bottom > visualRect.bottom - padding) {
          fitY -= treeRect.bottom - (visualRect.bottom - padding);
        }

        if (visualRect.height < 360) {
          fitY -= visualRect.height * 0.08;
        }

        tree.style.setProperty("--fit-x", `${Math.round(fitX)}px`);
        tree.style.setProperty("--fit-y", `${Math.round(fitY)}px`);
      }

      function queueTreeAnimation() {
        if (!tree) return;

        const start = () => {
          tree.classList.add("is-visible");
          window.setTimeout(() => {
            if (!prefersReduced) runTaskFlow(tree);
            else showReducedState(tree);
          }, 1120);
        };

        const rect = tree.getBoundingClientRect();
        if (rect.top < window.innerHeight && rect.bottom > 0) {
          start();
          return;
        }

        const observer = new IntersectionObserver(
          entries => {
            entries.forEach(entry => {
              if (!entry.isIntersecting) return;
              observer.unobserve(tree);
              start();
            });
          },
          { threshold: 0.15 }
        );

        observer.observe(tree);
      }

      function showReducedState(scope) {
        ["cto", "eng1", "eng2"].forEach(role => {
          scope.querySelector(`[data-role="${role}"]`)?.classList.add("is-live");
        });
      }

      function runTaskFlow(scope) {
        if (scope.dataset.flowRunning) return;
        scope.dataset.flowRunning = "1";

        const card = role => scope.querySelector(`[data-role="${role}"]`);
        const roles = {
          ceo: card("ceo"),
          cmo: card("cmo"),
          cto: card("cto"),
          coo: card("coo"),
          eng1: card("eng1"),
          eng2: card("eng2")
        };

        if (!roles.ceo || !roles.cto) return;

        const packet = document.createElement("div");
        packet.className = "task-packet";
        scope.appendChild(packet);

        const packetWidth = 18;
        const packetHeight = 9;

        const wait = ms => new Promise(resolve => window.setTimeout(resolve, ms));

        function nodePoint(el) {
          const root = scope.getBoundingClientRect();
          const rect = el.getBoundingClientRect();
          return {
            cx: (rect.left + rect.width / 2 - root.left) / fitScale,
            top: (rect.top - root.top) / fitScale,
            bottom: (rect.bottom - root.top) / fitScale
          };
        }

        function place(x, y) {
          packet.style.transition = "none";
          packet.style.left = `${x - packetWidth / 2}px`;
          packet.style.top = `${y - packetHeight / 2}px`;
          packet.getBoundingClientRect();
        }

        function move(x, y, ms, easing) {
          return new Promise(resolve => {
            packet.style.transition = `left ${ms}ms ${easing}, top ${ms}ms ${easing}`;
            packet.style.left = `${x - packetWidth / 2}px`;
            packet.style.top = `${y - packetHeight / 2}px`;
            window.setTimeout(resolve, ms + 30);
          });
        }

        async function travel(from, to) {
          const start = nodePoint(from);
          const end = nodePoint(to);
          const railY = end.top - 20;

          place(start.cx, start.bottom + 3);
          packet.style.visibility = "visible";
          packet.style.opacity = "1";
          await move(start.cx, railY, 520, "ease-in");
          await move(end.cx, railY, 640, "linear");
          await move(end.cx, end.top - 2, 380, "ease-in");

          packet.style.transition = "opacity 180ms ease";
          packet.style.opacity = "0";
          to.classList.add("is-live");
          await wait(220);
          packet.style.visibility = "hidden";
          await wait(40);
        }

        function clear(...items) {
          items.forEach(item => item?.classList.remove("is-live"));
        }

        async function loop() {
          while (document.body.contains(scope)) {
            await travel(roles.ceo, roles.cto);
            await wait(280);
            await travel(roles.cto, roles.eng1);
            await travel(roles.cto, roles.eng2);
            await wait(1500);
            clear(roles.cto, roles.eng1, roles.eng2);
            await wait(900);

            await travel(roles.ceo, roles.cmo);
            await wait(1500);
            clear(roles.cmo);
            await wait(900);

            await travel(roles.ceo, roles.coo);
            await wait(1500);
            clear(roles.coo);
            await wait(1400);
          }
        }

        loop();
      }
    </script>
  </body>
</html>
